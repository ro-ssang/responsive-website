<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Layout 05</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
    }
    body {
      background: #e3f2fd;
    }
    #wrap {
      margin: 0 auto;
      width: 1200px;
    }
    .header {
      width: 100%;
      height: 100px;
      background: #b3e5fc;
    }
    .aside {
      float: left;
      width: 30%;
      height: 900px;
      background: #81d4fa;
    }
    .article1 {
      float: left;
      background: #4fc3f7;
      width: 70%;
      height: 300px;
    }
    .article2 {
      float: left;
      background: #29b6f6;
      width: 70%;
      height: 300px;
    }
    .article3 {
      float: left;
      background: #03a9f4;
      width: 70%;
      height: 300px;
    }
    .footer {
      clear: both;
      width: 100%;
      height: 150px;
      background: #039be5;
    }

    /* 화면 너비 0 ~ 1200px */
    @media (max-width: 1240px) {
      #wrap {
        width: 100%;
      }
      .article1 {
        height: 450px;
      }
      .article2 {
        height: 450px;
      }
      .article3 {
        width: 100%;
      }
    }

    /* 화면 너비 0 ~ 768px */
    @media (max-width: 768px) {
      .aside {
        width: 100%;
        height: 300px;
      }
      .article1 {
        width: 50%;
      }
      .article2 {
        width: 50%;
      }
    }

    /* 화면 너비 0 ~ 480px */
    @media (max-width: 480px) {
      .article1 {
        width: 100%;
      }
      .article2 {
        width: 100%;
      }
    }
  </style>
  <body>
    <div id="wrap">
      <header class="header"></header>
      <aside class="aside"></aside>
      <section class="article1"></section>
      <section class="article2"></section>
      <section class="article3"></section>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
