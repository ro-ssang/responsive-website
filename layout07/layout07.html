<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Layout 07</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      body {
        background: #e8eaf6;
      }
      #wrap {
        width: 1200px;
        margin: 0 auto;
      }
      #header {
        height: 100px;
        background: #bbdefb;
      }
      #banner {
        height: 300px;
        background: #90caf9;
      }
      #content1 {
        overflow: hidden;
      }
      #content1 .nav {
        float: left;
        width: 30%;
        height: 500px;
        background: #1976d2;
      }
      #content1 .article_right1 {
        float: left;
        width: 70%;
        height: 250px;
        background: #1565c0;
      }
      #content1 .article_right2 {
        float: left;
        width: 70%;
        height: 250px;
        background: #0d47a1;
      }
      #content2 {
        overflow: hidden;
      }
      #content2 .article_box1 {
        float: left;
        width: 33.3333%;
        height: 300px;
        background: #82b1ff;
      }
      #content2 .article_box2 {
        float: left;
        width: 33.3333%;
        height: 300px;
        background: #448aff;
      }
      #content2 .article_box3 {
        float: left;
        width: 33.3333%;
        height: 300px;
        background: #2979ff;
      }
      #content3 {
        overflow: hidden;
        padding: 5%;
        background: #2196f3;
      }
      #content3 > .article_square1 {
        float: left;
        margin: 1%;
        width: 23%;
        height: 200px;
        background: #2962ff;
        border-radius: 5px;
      }
      #content3 > .article_square2 {
        float: left;
        margin: 1%;
        width: 23%;
        height: 200px;
        background: #2962ff;
        border-radius: 5px;
      }
      #content3 > .article_square3 {
        float: left;
        margin: 1%;
        width: 23%;
        height: 200px;
        background: #2962ff;
        border-radius: 5px;
      }
      #content3 > .article_square4 {
        float: left;
        margin: 1%;
        width: 23%;
        height: 200px;
        background: #2962ff;
        border-radius: 5px;
      }
      #footer {
        height: 100px;
        background: #1e88e5;
      }

      /* 화면 너비 0 ~ 1200px */
      @media (max-width: 1240px) {
        #wrap {
          width: 100%;
        }
        #content2 .article_box1 {
          width: 50%;
        }
        #content2 .article_box2 {
          width: 50%;
        }
        #content2 .article_box3 {
          display: none;
        }
        #content3 > .article_square1 {
          width: 31.3333%;
        }
        #content3 > .article_square2 {
          width: 31.3333%;
        }
        #content3 > .article_square3 {
          width: 31.3333%;
        }
        #content3 > .article_square4 {
          display: none;
        }
      }

      /* 화면 너비 0 ~ 768px */
      @media (max-width: 768px) {
        #content2 .article_box1 {
          width: 100%;
        }
        #content2 .article_box2 {
          width: 100%;
        }
      }

      /* 화면 너비 0 ~ 480px */
      @media (max-width: 480px) {
        #content1 .nav {
          width: 100%;
          height: 200px;
        }
        #content1 .article_right1 {
          height: 200px;
        }
        #content1 .article_right2 {
          height: 200px;
        }
        #content1 .article_right1 {
          width: 100%;
        }
        #content1 .article_right2 {
          width: 100%;
        }
        #content3 > .article_square1 {
          width: 98%;
        }
        #content3 > .article_square2 {
          width: 98%;
        }
        #content3 > .article_square3 {
          width: 98%;
        }
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <header id="header"></header>
      <section id="banner"></section>
      <section id="content1">
        <nav class="nav"></nav>
        <article class="article_right1"></article>
        <article class="article_right2"></article>
      </section>
      <section id="content2">
        <article class="article_box1"></article>
        <article class="article_box2"></article>
        <article class="article_box3"></article>
      </section>
      <section id="content3">
        <article class="article_square1"></article>
        <article class="article_square2"></article>
        <article class="article_square3"></article>
        <article class="article_square4"></article>
      </section>
      <footer id="footer"></footer>
    </div>
  </body>
</html>
